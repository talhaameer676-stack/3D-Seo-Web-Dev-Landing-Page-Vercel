<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testimonials - CORACLICK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slate: {
                950: '#030712',
              }
            }
          }
        }
      }
    </script>
    <script>
      const url = new URL(window.location.href);
      const theme = url.searchParams.get("theme") || "dark";
      if (theme) {
        document.documentElement.classList.add(theme);
      }
    </script>
    <style>
      body {
        margin: 0;
        background-color: transparent !important;
        overflow-x: hidden;
      }
      /* Hide scrollbar for standard browser display inside iframe */
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="bg-transparent text-white">
    <div id="root"></div>
    <script type="module" src="/stacking-card.js"></script>
  </body>
</html>
